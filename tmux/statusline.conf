# vim: ft=tmux
set -g mode-style "fg=#eee8d5,bg=#073642"

set -g message-style "fg=#eee8d5,bg=#073642"
set -g message-command-style "fg=#eee8d5,bg=#073642"

set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#eee8d5"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#586e75,bg=#6272a4"

set -g status-bg "#6272a4"

set -g status-left-length "100"
set -g status-left-length "0"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

setw -g window-status-activity-style "underscore,fg=#839496,bg=#002b36"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#839496,bg=#002b36"
setw -g window-status-format '#[fg=#6272a4,bg=#bd93f9,nobold,nounderscore,noitalics]#[fg=#282a36,bg=#bd93f9] #I: #{b:pane_current_path} #[bg=#6272a4,fg=#bd93f9,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#6272a4,bg=#ffb86c,nobold,nounderscore,noitalics]#[fg=#282a36,bg=#ffb86c] 🟢 #{b:pane_current_path} #[bg=#6272a4,fg=#ffb86c,nobold,nounderscore,noitalics]'

